name: Sync Substack RSS

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pull latest posts from Substack RSS
        run: python3 scripts/sync.py

      - name: Generate Haiku summaries for new posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [[ -z "$ANTHROPIC_API_KEY" ]]; then
            echo "ANTHROPIC_API_KEY secret not set — skipping summaries."
            echo "Add it under Settings → Secrets and variables → Actions to enable."
            exit 0
          fi
          python3 scripts/summarize.py

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json data/summaries.json posts/ images/
          git commit -m "sync: pull latest posts from Substack RSS"
          git push
